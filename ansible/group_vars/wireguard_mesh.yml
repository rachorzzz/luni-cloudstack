---
wg_interface: wg1           # Change to wg0 if not already taken on your hosts
wg_port: 51821              # Choose a port not used by existing WireGuard tunnels
wg_subnet: "172.16.100.0/24"
wg_keepalive: 25            # Seconds — keeps NAT state alive, important for Network1 hosts

# Key storage paths on the remote host
wg_config_dir: /etc/wireguard
wg_private_key_file: "{{ wg_config_dir }}/{{ wg_interface }}_private.key"
wg_public_key_file: "{{ wg_config_dir }}/{{ wg_interface }}_public.key"
