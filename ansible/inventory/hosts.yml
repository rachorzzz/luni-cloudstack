---
all:
  children:

    # ── WireGuard mesh ────────────────────────────────────────────────────────
    wireguard_mesh:
      hosts:
        hp-01:
          ansible_host: 100.93.75.19
          wg_ip: 172.16.100.1
          wg_endpoint: 100.93.75.19

        hp-02:
          ansible_host: 100.124.102.103
          wg_ip: 172.16.100.2
          wg_endpoint: 100.124.102.103

        main-hp:
          ansible_host: 100.68.102.106
          wg_ip: 172.16.100.3
          wg_endpoint: 100.68.102.106

        main-1:
          ansible_host: 100.117.99.12
          wg_ip: 172.16.100.4
          wg_endpoint: 100.117.99.12

        main-2:
          ansible_host: 100.99.132.72
          wg_ip: 172.16.100.5
          wg_endpoint: 100.99.132.72

    # ── CloudStack management server ──────────────────────────────────────────
    cloudstack_management:
      hosts:
        main-hp:

    # ── NFS server (exports primary + secondary storage) ──────────────────────
    nfs_server:
      hosts:
        main-hp:

    # ── NFS cluster — hp-01 and hp-02 mount NFS primary storage ──────────────
    nfs_cluster:
      hosts:
        hp-01:
        hp-02:

    # ── Local storage cluster ─────────────────────────────────────────────────
    local_cluster:
      hosts:
        main-hp:
        main-1:
        main-2:

    # ── All KVM compute hosts ─────────────────────────────────────────────────
    cloudstack_agents:
      children:
        nfs_cluster:
        local_cluster:
