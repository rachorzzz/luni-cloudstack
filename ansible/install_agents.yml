---
# CloudStack 4.22 — KVM Agent
# Targets: hp-01, hp-02 (Ubuntu 24.04), main-1, main-2 (Debian Trixie)
#
# Debian Trixie note:
#   CloudStack 4.22.0 has no trixie repo yet (tracked in issue #12374, targeting 4.22.1).
#   The bookworm agent packages install and run correctly on Trixie.
#   This playbook uses 'bookworm' repo for Debian hosts regardless of actual codename.
#
# Ubuntu 24.04 note:
#   libvirtd socket activation must be masked — Ubuntu 24.04 uses the modular
#   driver daemons by default, which CloudStack does not support.

- name: Install CloudStack 4.22 KVM agent
  hosts:
    - hp-01
    - hp-02
    - main-1
    - main-2
  become: true
  vars:
    cs_version: "4.22"
    cs_repo_key: "https://download.cloudstack.org/release.asc"
    mgmt_server_ip: "10.10.1.1"    # br-mgmt IP of main-hp

  tasks:

    # ------------------------------------------------------------------ #
    #  OS detection — sets cs_repo and libvirt_mode per host              #
    # ------------------------------------------------------------------ #

    - name: Set repo and mode for Ubuntu 24.04
      ansible.builtin.set_fact:
        cs_repo: "deb https://download.cloudstack.org/ubuntu noble {{ cs_version }}"
        libvirt_socket_mask: true
      when: ansible_distribution == "Ubuntu"

    - name: Set repo and mode for Debian (use bookworm repo regardless of codename)
      ansible.builtin.set_fact:
        cs_repo: "deb https://download.cloudstack.org/debian bookworm {{ cs_version }}"
        libvirt_socket_mask: true
      when: ansible_distribution == "Debian"

    # ------------------------------------------------------------------ #
    #  System prerequisites                                                #
    # ------------------------------------------------------------------ #

    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - wget
          - chrony
          - bridge-utils
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - virtinst
          - cpu-checker
        state: present
        update_cache: true

    - name: Enable and start chrony
      ansible.builtin.systemd:
        name: chrony
        enabled: true
        state: started

    - name: Set FQDN hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}.cloudstack.local"

    - name: Ensure /etc/hosts has FQDN for this host
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^{{ hostvars[inventory_hostname].wg_ip }}"
        line: "{{ hostvars[inventory_hostname].wg_ip }} {{ inventory_hostname }}.cloudstack.local {{ inventory_hostname }}"

    - name: Check hardware virtualisation support
      ansible.builtin.command: kvm-ok
      register: kvm_ok
      changed_when: false
      failed_when: false

    - name: Warn if KVM acceleration not available
      ansible.builtin.debug:
        msg: "WARNING: KVM acceleration not available on {{ inventory_hostname }} — VMs will run slowly"
      when: kvm_ok.rc != 0

    # ------------------------------------------------------------------ #
    #  libvirt — Ubuntu 24.04 and Debian Trixie both need socket masking  #
    #  and traditional libvirtd mode                                       #
    # ------------------------------------------------------------------ #

    - name: Mask libvirtd modular sockets (required on Ubuntu 24.04 and Debian Trixie)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - libvirtd.socket
        - libvirtd-ro.socket
        - libvirtd-admin.socket
        - libvirtd-tls.socket
        - libvirtd-tcp.socket
      when: libvirt_socket_mask

    - name: Configure libvirt to use traditional libvirtd (not per-driver daemons)
      ansible.builtin.lineinfile:
        path: /etc/libvirt/libvirt.conf
        line: "uri_default = \"qemu:///system\""
        create: true
        mode: "0644"

    - name: Configure libvirtd — disable TLS, enable TCP on 16509
      ansible.builtin.blockinfile:
        path: /etc/libvirt/libvirtd.conf
        marker: "# {mark} CLOUDSTACK MANAGED"
        block: |
          listen_tls   = 0
          listen_tcp   = 1
          tcp_port     = "16509"
          mdns_adv     = 0
          auth_tcp     = "none"

    - name: Configure libvirtd — disable VNC TLS, allow all listen addresses
      ansible.builtin.lineinfile:
        path: /etc/libvirt/qemu.conf
        regexp: "^#?vnc_listen"
        line: 'vnc_listen = "0.0.0.0"'

    - name: Enable and restart libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: restarted

    # ------------------------------------------------------------------ #
    #  CloudStack apt repository                                           #
    # ------------------------------------------------------------------ #

    - name: Add CloudStack GPG key
      ansible.builtin.shell: |
        wget -O - {{ cs_repo_key }} | tee /etc/apt/trusted.gpg.d/cloudstack.asc
      args:
        creates: /etc/apt/trusted.gpg.d/cloudstack.asc

    - name: Add CloudStack apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/cloudstack.list
        content: "{{ cs_repo }}\n"
        mode: "0644"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    # ------------------------------------------------------------------ #
    #  CloudStack agent                                                    #
    # ------------------------------------------------------------------ #

    - name: Install cloudstack-agent
      ansible.builtin.apt:
        name: cloudstack-agent
        state: present

    - name: Configure agent — set management server IP
      ansible.builtin.lineinfile:
        path: /etc/cloudstack/agent/agent.properties
        regexp: "^host="
        line: "host={{ mgmt_server_ip }}"

    - name: Configure agent — set br-mgmt as private NIC
      ansible.builtin.lineinfile:
        path: /etc/cloudstack/agent/agent.properties
        regexp: "^private.network.device="
        line: "private.network.device=br-mgmt"

    - name: Configure agent — set guest network bridge
      ansible.builtin.lineinfile:
        path: /etc/cloudstack/agent/agent.properties
        regexp: "^guest.network.device="
        line: "guest.network.device=br-guest"

    - name: Configure agent — set public bridge (same as guest for VXLAN lab)
      ansible.builtin.lineinfile:
        path: /etc/cloudstack/agent/agent.properties
        regexp: "^public.network.device="
        line: "public.network.device=br-guest"

    # ------------------------------------------------------------------ #
    #  UFW — allow libvirt and CloudStack agent ports                     #
    # ------------------------------------------------------------------ #

    - name: Allow libvirt TCP port from management server
      community.general.ufw:
        rule: allow
        src: "{{ mgmt_server_ip }}"
        port: "16509"
        proto: tcp

    - name: Allow VNC console port range
      community.general.ufw:
        rule: allow
        src: "{{ mgmt_server_ip }}"
        port: "5900:6100"
        proto: tcp

    # ------------------------------------------------------------------ #
    #  Enable and start agent                                              #
    # ------------------------------------------------------------------ #

    - name: Enable and start cloudstack-agent
      ansible.builtin.systemd:
        name: cloudstack-agent
        enabled: true
        state: started

    # ------------------------------------------------------------------ #
    #  Verify                                                              #
    # ------------------------------------------------------------------ #

    - name: Check agent service status
      ansible.builtin.command: systemctl status cloudstack-agent --no-pager
      register: agent_status
      changed_when: false

    - name: Print agent status
      ansible.builtin.debug:
        var: agent_status.stdout_lines

    - name: Verify libvirt is reachable locally
      ansible.builtin.command: virsh list --all
      register: virsh_out
      changed_when: false

    - name: Print virsh output
      ansible.builtin.debug:
        var: virsh_out.stdout_lines

    - name: Print post-install notes
      ansible.builtin.debug:
        msg:
          - "Agent installed on {{ inventory_hostname }}."
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Repo used: {{ cs_repo }}"
          - "Next: add this host to a cluster in the CloudStack UI (Infrastructure > Hosts > Add Host)"
          - "Management server: http://{{ mgmt_server_ip }}:8080/client"
