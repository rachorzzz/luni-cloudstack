---
- name: Enable EPEL repository (Rocky/RHEL)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_os_family == 'RedHat'

- name: Install WireGuard (Debian)
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Install WireGuard (Rocky/RHEL)
  ansible.builtin.dnf:
    name: wireguard-tools
    state: present
  when: ansible_os_family == 'RedHat'

- name: Ensure WireGuard config directory exists
  ansible.builtin.file:
    path: "{{ wg_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

# ── Key generation ────────────────────────────────────────────────────────────

- name: Check if private key already exists
  ansible.builtin.stat:
    path: "{{ wg_private_key_file }}"
  register: wg_privkey_stat

- name: Generate WireGuard private key
  ansible.builtin.shell:
    cmd: "wg genkey > {{ wg_private_key_file }}"
  when: not wg_privkey_stat.stat.exists

- name: Set private key file permissions
  ansible.builtin.file:
    path: "{{ wg_private_key_file }}"
    owner: root
    group: root
    mode: '0600'

- name: Derive public key from private key
  ansible.builtin.shell:
    cmd: "wg pubkey < {{ wg_private_key_file }} > {{ wg_public_key_file }}"
  when: not wg_privkey_stat.stat.exists

- name: Read private key
  ansible.builtin.slurp:
    src: "{{ wg_private_key_file }}"
  register: wg_private_key_b64

- name: Read public key
  ansible.builtin.slurp:
    src: "{{ wg_public_key_file }}"
  register: wg_public_key_b64

- name: Store keys as host facts
  ansible.builtin.set_fact:
    wg_private_key: "{{ wg_private_key_b64.content | b64decode | trim }}"
    wg_public_key: "{{ wg_public_key_b64.content | b64decode | trim }}"

# ── Client key generation (for road-warrior peers like laptops) ──────────────

- name: Generate WireGuard client keys
  ansible.builtin.shell:
    cmd: |
      PRIVKEY=$(wg genkey)
      echo "$PRIVKEY" > {{ wg_config_dir }}/client_{{ item.name }}_private.key
      echo "$PRIVKEY" | wg pubkey > {{ wg_config_dir }}/client_{{ item.name }}_public.key
      chmod 600 {{ wg_config_dir }}/client_{{ item.name }}_private.key
    creates: "{{ wg_config_dir }}/client_{{ item.name }}_private.key"
  loop: "{{ wg_clients | default([]) }}"

- name: Read client public keys
  ansible.builtin.slurp:
    src: "{{ wg_config_dir }}/client_{{ item.name }}_public.key"
  loop: "{{ wg_clients | default([]) }}"
  register: wg_client_pubkeys

- name: Read client private keys
  ansible.builtin.slurp:
    src: "{{ wg_config_dir }}/client_{{ item.name }}_private.key"
  loop: "{{ wg_clients | default([]) }}"
  register: wg_client_privkeys

- name: Store client keys as facts
  ansible.builtin.set_fact:
    wg_client_keys: >-
      {{ wg_client_keys | default({}) | combine({
        item.item.name: {
          'public': (wg_client_pubkeys.results | selectattr('item.name', 'equalto', item.item.name) | first).content | b64decode | trim,
          'private': item.content | b64decode | trim
        }
      }) }}
  loop: "{{ wg_client_privkeys.results | default([]) }}"
  when: wg_clients is defined and wg_clients | length > 0
