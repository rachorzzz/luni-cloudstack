---
- name: Create neutron user
  ansible.builtin.command:
    cmd: openstack user create --domain default --password {{ neutron_pass }} neutron
  environment: "{{ os_admin_env }}"
  register: result
  failed_when: result.rc != 0 and "HTTP 409" not in result.stderr
  changed_when: result.rc == 0
  no_log: true

- name: Add neutron user to service project with admin role
  ansible.builtin.command:
    cmd: openstack role add --project service --user neutron admin
  environment: "{{ os_admin_env }}"
  changed_when: false

- name: Create neutron service
  ansible.builtin.command:
    cmd: openstack service create --name neutron --description "OpenStack Networking" network
  environment: "{{ os_admin_env }}"
  register: result
  failed_when: result.rc != 0 and "HTTP 409" not in result.stderr
  changed_when: result.rc == 0

- name: List existing neutron endpoints
  ansible.builtin.shell:
    cmd: openstack endpoint list -f value -c "Service Type" -c Interface | awk '/^network / {print $2}'
  environment: "{{ os_admin_env }}"
  register: neutron_endpoints
  changed_when: false

- name: Create neutron endpoints
  ansible.builtin.command:
    cmd: openstack endpoint create --region RegionOne network {{ item }} http://{{ wg_ip }}:9696
  environment: "{{ os_admin_env }}"
  loop:
    - public
    - internal
    - admin
  when: item not in neutron_endpoints.stdout_lines

- name: Install neutron packages
  ansible.builtin.package:
    name:
      - neutron-server
      - neutron-plugin-ml2
      - python3-neutron-lib
    state: present

- name: Configure neutron.conf
  ansible.builtin.template:
    src: neutron.conf.j2
    dest: /etc/neutron/neutron.conf
    owner: neutron
    group: neutron
    mode: "0640"
  notify: Restart neutron-server

- name: Configure ml2_conf.ini
  ansible.builtin.template:
    src: ml2_conf.ini.j2
    dest: /etc/neutron/plugins/ml2/ml2_conf.ini
    owner: neutron
    group: neutron
    mode: "0640"
  notify: Restart neutron-server

- name: Sync neutron database
  ansible.builtin.command:
    cmd: >
      neutron-db-manage
      --config-file /etc/neutron/neutron.conf
      --config-file /etc/neutron/plugins/ml2/ml2_conf.ini
      upgrade head
  become: true
  become_user: neutron
  changed_when: false
