---
- name: Flush handlers to ensure apache2 is running before OpenStack API calls
  ansible.builtin.meta: flush_handlers

- name: Create OpenStack projects
  ansible.builtin.command:
    cmd: openstack project create --domain default --description "{{ item.description }}" {{ item.name }}
  environment: "{{ os_admin_env }}"
  loop:
    - { name: service, description: "Service Project" }
    - { name: demo,    description: "Demo Project" }
  register: project_result
  failed_when: project_result.rc != 0 and "HTTP 409" not in project_result.stderr
  changed_when: project_result.rc == 0
  no_log: true
