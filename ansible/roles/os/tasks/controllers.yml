---
- name: Install mariadb
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - mariadb-server
    - python3-pymysql

- name: mariadb config
  ansible.builtin.template:
    src: mariadb_openstack.cnf
    dest: /etc/mysql/mariadb.conf.d/99-openstack.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mariadb

- name: Ensure /etc/rabbitmq exists
  ansible.builtin.file:
    path: /etc/rabbitmq
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure rabbitmq node IP before install
  ansible.builtin.copy:
    dest: /etc/rabbitmq/rabbitmq-env.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      NODE_IP_ADDRESS={{ wg_ip }}
  notify: Restart rabbitmq

- name: Create OpenStack databases
  community.mysql.mysql_db:
    name: "{{ item }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  loop:
    - keystone
    - glance
    - placement
    - nova
    - nova_api
    - nova_cell0
    - neutron

- name: Create OpenStack database users
  community.mysql.mysql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    priv: "{{ item.priv }}"
    host: "{{ item.host }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  loop:
    - { name: keystone,   password: "{{ keystone_db_pass }}",   host: localhost, priv: "keystone.*:ALL" }
    - { name: keystone,   password: "{{ keystone_db_pass }}",   host: "%",       priv: "keystone.*:ALL" }
    - { name: glance,     password: "{{ glance_db_pass }}",     host: localhost, priv: "glance.*:ALL" }
    - { name: glance,     password: "{{ glance_db_pass }}",     host: "%",       priv: "glance.*:ALL" }
    - { name: placement,  password: "{{ placement_db_pass }}",  host: localhost, priv: "placement.*:ALL" }
    - { name: placement,  password: "{{ placement_db_pass }}",  host: "%",       priv: "placement.*:ALL" }
    - { name: nova,       password: "{{ nova_db_pass }}",       host: localhost, priv: "nova.*:ALL/nova_api.*:ALL/nova_cell0.*:ALL" }
    - { name: nova,       password: "{{ nova_db_pass }}",       host: "%",       priv: "nova.*:ALL/nova_api.*:ALL/nova_cell0.*:ALL" }
    - { name: neutron,    password: "{{ neutron_db_pass }}",    host: localhost, priv: "neutron.*:ALL" }
    - { name: neutron,    password: "{{ neutron_db_pass }}",    host: "%",       priv: "neutron.*:ALL" }
  no_log: true

- name: install rabbitmq
  ansible.builtin.package:
    name: rabbitmq-server
    state: present

- name: install memcached
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - memcached
    # - python3-memcached

- name: Ensure rabbitmq openstack user exists
  community.rabbitmq.rabbitmq_user:
    user: openstack
    password: "{{ rabbit_pass }}"
    permissions:
      - vhost: /
        configure_priv: ".*"
        write_priv: ".*"
        read_priv: ".*"
    state: present
    update_password: always

- name: Ensure memcached listens on wireguard IP
  ansible.builtin.lineinfile:
    path: /etc/memcached.conf
    regexp: "^-l "
    line: "-l {{ wg_ip }}"
  notify: Restart memcached


