---
- name: Install NFS client packages
  ansible.builtin.package:
    name:
      - nfs-common
    state: present

- name: Create NFS mount points
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /mnt/primary
    - /mnt/secondary

- name: Wait for NFS server to be reachable on port 2049
  ansible.builtin.wait_for:
    host: "{{ nfs_server_ip }}"
    port: 2049
    timeout: 15

- name: Add NFS mounts to fstab
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "vers=4,rsize=131072,wsize=131072,hard,timeo=600,retrans=3"
    state: present
  loop:
    - { src: "{{ nfs_server_ip }}:{{ nfs_primary_export }}",   path: /mnt/primary }
    - { src: "{{ nfs_server_ip }}:{{ nfs_secondary_export }}", path: /mnt/secondary }

- name: Mount NFS shares
  ansible.builtin.command:
    cmd: timeout 30 mount {{ item }}
  loop:
    - /mnt/primary
    - /mnt/secondary
  register: mount_result
  failed_when: mount_result.rc != 0
  changed_when: mount_result.rc == 0

- name: Verify NFS mounts are accessible
  ansible.builtin.command:
    cmd: mountpoint -q {{ item }}
  loop:
    - /mnt/primary
    - /mnt/secondary
  changed_when: false
