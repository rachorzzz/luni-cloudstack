---
# CloudStack 4.22 — Seed system VM template into secondary storage
# Target: main-hp only
# Runtime: up to 30 minutes (downloads ~2.5GB, decompresses, installs)

- name: Seed CloudStack system VM template
  hosts: main-hp
  become: true

  vars:
    secondary_storage: "/data/cloudstack/secondary"
    template_url: "http://download.cloudstack.org/systemvm/4.22/systemvmtemplate-4.22.0-x86_64-kvm.qcow2.bz2"
    seed_script: "/usr/share/cloudstack-common/scripts/storage/secondary/cloud-install-sys-tmplt"

    # Marker file written by the seed script — presence means already done
    marker: "{{ secondary_storage }}/template/tmpl/1/1"

  tasks:

    - name: Ensure secondary storage directory exists and is owned by cloud
      ansible.builtin.file:
        path: "{{ secondary_storage }}"
        state: directory
        owner: cloud
        group: cloud
        mode: "0755"

    - name: Check if template already seeded
      ansible.builtin.stat:
        path: "{{ marker }}"
      register: seeded

    - name: Show skip message if already seeded
      ansible.builtin.debug:
        msg: "System VM template already seeded at {{ marker }} — skipping download."
      when: seeded.stat.exists

    - name: Seed system VM template (downloads ~2.5 GB — takes up to 30 min)
      ansible.builtin.command: >
        {{ seed_script }}
        -m {{ secondary_storage }}
        -u {{ template_url }}
        -h kvm
        -F
      when: not seeded.stat.exists
      async: 3600
      poll: 30
      register: seed_result

    - name: Print seed output
      ansible.builtin.debug:
        var: seed_result.stdout_lines
      when:
        - not seeded.stat.exists
        - seed_result is defined

    - name: Fix ownership on seeded files
      ansible.builtin.file:
        path: "{{ secondary_storage }}"
        owner: cloud
        group: cloud
        recurse: true

    - name: Verify template directory structure exists
      ansible.builtin.stat:
        path: "{{ marker }}"
      register: verify

    - name: Confirm seeding result
      ansible.builtin.debug:
        msg: "{{ 'Template seeded successfully.' if verify.stat.exists else 'WARNING: marker path not found — seeding may have failed. Check seed_result output above.' }}"
