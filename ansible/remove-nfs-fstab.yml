---
- name: Remove NFS entries from /etc/fstab
  hosts: all
  gather_facts: false
  tasks:
    - name: Show current NFS fstab entries
      ansible.builtin.shell: grep -i nfs /etc/fstab || true
      register: nfs_entries
      changed_when: false

    - name: Print NFS entries found
      ansible.builtin.debug:
        msg: "{{ nfs_entries.stdout_lines }}"

    - name: Remove NFS entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\bnfs[^s]|\bnfs$|\bnfs4\b'
        state: absent

    - name: Get active NFS mounts
      ansible.builtin.shell: findmnt -t nfs,nfs4 -n -o TARGET || true
      register: nfs_mounts
      changed_when: false

    - name: Unmount active NFS mounts
      ansible.posix.mount:
        path: "{{ item }}"
        state: unmounted
      loop: "{{ nfs_mounts.stdout_lines }}"
      when: nfs_mounts.stdout_lines | length > 0
