---
# Phase 2 — First compute host
# Deploys the CloudStack KVM agent on main-hp only.
# Validate zone/cluster/storage setup in the UI before Phase 3.
#
# After this playbook, you must manually complete zone setup in the UI:
#   1. Add Zone (Advanced, internal DNS = 172.16.100.3, public DNS = 8.8.8.8)
#   2. Add Pod (gateway = your LAN gateway, netmask, IP range)
#   3. Add Cluster "local-cluster" (KVM hypervisor)
#   4. Add first host: main-hp (172.16.100.3)
#   5. Add primary storage: local (for local-cluster)
#   6. Add secondary storage: NFS 172.16.100.3:/export/secondary
#
# Usage: ansible-playbook phase2_first_agent.yml

- name: Phase 2 — KVM agent on main-hp
  hosts: main-hp
  become: true
  roles:
    - cloudstack_agent

- name: Phase 2 complete
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remind operator to complete zone setup
      ansible.builtin.debug:
        msg:
          - "Agent deployed on main-hp."
          - "Now complete zone setup in the CloudStack UI before running Phase 3."
          - "UI: http://172.16.100.3:8080/client"
