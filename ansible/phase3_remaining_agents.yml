---
# Phase 3 — Remaining compute hosts
# Deploys CloudStack KVM agent on all remaining hosts.
# NFS clients are also configured on hp-01 and hp-02.
#
# Prerequisites:
#   - Phase 1 and Phase 2 complete
#   - Zone, Pod, and both Clusters created in the UI
#   - main-hp already added and in "Up" state
#
# Usage: ansible-playbook phase3_remaining_agents.yml

- name: Phase 3a — NFS client setup for nfs_cluster hosts
  hosts: nfs_cluster
  become: true
  roles:
    - nfs_client

- name: Phase 3b — KVM agent on all remaining hosts
  hosts: cloudstack_agents
  become: true
  vars:
    # Skip main-hp — already done in Phase 2
    ansible_limit: "{{ groups['cloudstack_agents'] | reject('equalto', 'main-hp') | list }}"
  roles:
    - cloudstack_agent
  when: inventory_hostname != 'main-hp'

- name: Phase 3 complete
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remind operator to add hosts in UI
      ansible.builtin.debug:
        msg:
          - "Agents deployed on all remaining hosts."
          - "Add each host to its cluster in the CloudStack UI:"
          - "  nfs-cluster:   hp-01 (172.16.100.1), hp-02 (172.16.100.2)"
          - "  local-cluster: main-1 (172.16.100.4), main-2 (172.16.100.5)"
          - ""
          - "Primary storage per cluster:"
          - "  nfs-cluster:   NFS  172.16.100.3:/export/primary"
          - "  local-cluster: Local (select per host when adding)"
