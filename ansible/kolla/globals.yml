---
# =============================================================================
# Kolla-Ansible Global Configuration
# Deploy host: controller-vm (172.16.102.1)
# Release: OpenStack 2024.2 (Dalmatian)
# =============================================================================

kolla_install_type: "binary"

# =============================================================================
# Networking
# =============================================================================

# Management/API network — single NIC per VM, WireGuard-bridged
network_interface: "ens2"

# Neutron external interface — a second NIC (ens6) attached to virbr-wg,
# giving br-ex real L2 connectivity to the provider network.
# Added via hot-plug in 07-kolla-prep.yml on the controller VM.
neutron_external_interface: "ens6"

# Single controller, no HA — VIP = controller's own IP
kolla_internal_vip_address: "172.16.102.1"
kolla_external_vip_address: "172.16.102.1"

# =============================================================================
# High Availability — disabled (single controller)
# =============================================================================

enable_haproxy: "no"
enable_proxysql: "no"

# =============================================================================
# OpenStack Services
# =============================================================================

enable_keystone: "yes"
enable_glance: "yes"
enable_placement: "yes"
enable_nova: "yes"
enable_neutron: "yes"
enable_horizon: "yes"

enable_cinder: "no"
enable_heat: "no"
enable_barbican: "no"
enable_octavia: "no"

# =============================================================================
# Nova
# =============================================================================

# VMs are created with --cpu host-passthrough, so nested KVM is available
nova_compute_virt_type: "kvm"

# =============================================================================
# Neutron
# =============================================================================

neutron_plugin_agent: "openvswitch"

# Type drivers: flat for provider, vxlan for tenant overlay
neutron_type_drivers: "flat,vxlan"
neutron_tenant_network_types: "vxlan"

# VXLAN IDs for tenant networks
neutron_vxlan_vni_ranges: "1:1000"

# Provider network mapping — flat net over br-ex (backed by dummy0)
neutron_bridge_name: "br-ex"

# =============================================================================
# Glance
# =============================================================================

# Local file backend (no Ceph/NFS)
glance_backend_file: "yes"
glance_backend_ceph: "no"

# =============================================================================
# Docker
# =============================================================================

# Use overlay2 storage driver
docker_storage_driver: "overlay2"
