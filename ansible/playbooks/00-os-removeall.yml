# SPDX-License-Identifier: MIT-0
---
# Completely removes all OpenStack components from every node so that
# the setup playbooks can be run again on a clean slate.
#
# Run order matters:
#   1. Compute nodes first (stop compute services, clean OVS)
#   2. Controller last (drop databases, purge packages)

- name: Remove OpenStack compute components from all compute nodes
  hosts: compute
  become: true
  gather_facts: false

  pre_tasks:
    - name: Gather OS family facts
      ansible.builtin.setup:
        gather_subset: ['!all', '!min', 'distribution']

  tasks:
    - name: Stop compute services
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
      loop:
        - nova-compute
        - ovn-host
        - openvswitch
        - libvirtd
      ignore_errors: true

    - name: Purge compute packages (Debian)
      ansible.builtin.apt:
        name:
          - nova-compute
          - nova-compute-kvm
          - nova-compute-libvirt
          - nova-common
          - python3-nova
          - ovn-host
          - openvswitch-switch
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
        state: absent
        purge: true
      ignore_errors: true
      when: ansible_os_family == 'Debian'

    - name: Purge compute packages (Rocky)
      ansible.builtin.dnf:
        name:
          - openstack-nova-compute
          - python3-nova
          - ovn-host
          - openvswitch
          - qemu-kvm
          - libvirt-daemon
          - libvirt-client
        state: absent
        autoremove: true
      ignore_errors: true
      when: ansible_os_family == 'RedHat'

    - name: Clear OVS external-ids set by nova/neutron
      ansible.builtin.command:
        cmd: >
          ovs-vsctl clear open_vswitch .
          external-ids:ovn-remote
          external-ids:ovn-encap-type
          external-ids:ovn-encap-ip
          external-ids:ovn-bridge
          external-ids:ovn-bridge-mappings
      ignore_errors: true

    - name: Remove br-ex bridge
      ansible.builtin.command:
        cmd: ovs-vsctl --if-exists del-br br-ex
      ignore_errors: true

    - name: Remove br-ex-route systemd unit file
      ansible.builtin.file:
        path: /etc/systemd/system/br-ex-route.service
        state: absent
      notify: Reload systemd

    - name: Remove nova config and data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nova
        - /var/lib/nova
        - /var/log/nova

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

- name: Remove OpenStack controller components from controller
  hosts: controllers
  become: true
  gather_facts: false

  pre_tasks:
    - name: Gather OS family facts
      ansible.builtin.setup:
        gather_subset: ['!all', '!min', 'distribution']

  tasks:
    - name: Stop controller services (Debian)
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
      loop:
        - nova-api
        - nova-scheduler
        - nova-conductor
        - nova-novncproxy
        - neutron-server
        - glance-api
        - ovn-northd
        - ovn-host
        - openvswitch-switch
        - apache2
        - memcached
        - rabbitmq-server
        - br-ex-route
      ignore_errors: true
      when: ansible_os_family == 'Debian'

    - name: Stop controller services (Rocky)
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
      loop:
        - openstack-nova-api
        - openstack-nova-scheduler
        - openstack-nova-conductor
        - openstack-nova-novncproxy
        - neutron-server
        - openstack-glance-api
        - ovn-northd
        - ovn-host
        - openvswitch
        - httpd
        - memcached
        - rabbitmq-server
        - br-ex-route
      ignore_errors: true
      when: ansible_os_family == 'RedHat'

    - name: Drop OpenStack databases (Debian)
      community.mysql.mysql_db:
        name: "{{ item }}"
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock
      loop:
        - keystone
        - glance
        - placement
        - nova
        - nova_api
        - nova_cell0
        - neutron
      ignore_errors: true
      when: ansible_os_family == 'Debian'

    - name: Drop OpenStack databases (Rocky)
      community.mysql.mysql_db:
        name: "{{ item }}"
        state: absent
        login_unix_socket: /var/lib/mysql/mysql.sock
      loop:
        - keystone
        - glance
        - placement
        - nova
        - nova_api
        - nova_cell0
        - neutron
      ignore_errors: true
      when: ansible_os_family == 'RedHat'

    - name: Drop OpenStack database users (Debian)
      community.mysql.mysql_user:
        name: "{{ item }}"
        host_all: true
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock
      loop:
        - keystone
        - glance
        - placement
        - nova
        - neutron
      ignore_errors: true
      when: ansible_os_family == 'Debian'

    - name: Drop OpenStack database users (Rocky)
      community.mysql.mysql_user:
        name: "{{ item }}"
        host_all: true
        state: absent
        login_unix_socket: /var/lib/mysql/mysql.sock
      loop:
        - keystone
        - glance
        - placement
        - nova
        - neutron
      ignore_errors: true
      when: ansible_os_family == 'RedHat'

    - name: Purge controller OpenStack packages (Debian)
      ansible.builtin.apt:
        name:
          - nova-api
          - nova-scheduler
          - nova-conductor
          - nova-novncproxy
          - nova-compute
          - nova-compute-kvm
          - nova-compute-libvirt
          - nova-common
          - python3-nova
          - neutron-server
          - neutron-plugin-ml2
          - neutron-common
          - python3-neutron
          - python3-neutron-lib
          - glance
          - glance-api
          - glance-common
          - python3-glance
          - keystone
          - keystone-common
          - python3-keystone
          - placement-api
          - placement-common
          - python3-placement
          - openstack-dashboard
        state: absent
        purge: true
      ignore_errors: true
      when: ansible_os_family == 'Debian'

    - name: Autoremove orphaned packages (Debian)
      ansible.builtin.apt:
        autoremove: true
        purge: true
      when: ansible_os_family == 'Debian'

    - name: Purge controller OpenStack packages (Rocky)
      ansible.builtin.dnf:
        name:
          - openstack-nova-api
          - openstack-nova-scheduler
          - openstack-nova-conductor
          - openstack-nova-novncproxy
          - openstack-nova-compute
          - python3-nova
          - openstack-neutron-server
          - openstack-neutron-ml2
          - python3-neutron
          - openstack-glance
          - python3-glance
          - openstack-keystone
          - python3-keystone
          - openstack-placement-api
          - python3-placement
          - openstack-dashboard
        state: absent
        autoremove: true
      ignore_errors: true
      when: ansible_os_family == 'RedHat'

    - name: Clear OVS external-ids on controller
      ansible.builtin.command:
        cmd: >
          ovs-vsctl clear open_vswitch .
          external-ids:ovn-remote
          external-ids:ovn-encap-type
          external-ids:ovn-encap-ip
          external-ids:ovn-bridge
          external-ids:ovn-bridge-mappings
      ignore_errors: true

    - name: Remove br-ex bridge on controller
      ansible.builtin.command:
        cmd: ovs-vsctl --if-exists del-br br-ex
      ignore_errors: true

    - name: Remove br-ex-route systemd unit
      ansible.builtin.systemd:
        name: br-ex-route
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove br-ex-route unit file
      ansible.builtin.file:
        path: /etc/systemd/system/br-ex-route.service
        state: absent

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Remove OpenStack config, data and log directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nova
        - /etc/neutron
        - /etc/glance
        - /etc/keystone
        - /etc/placement
        - /etc/openstack-dashboard
        - /var/lib/nova
        - /var/lib/neutron
        - /var/lib/glance
        - /var/lib/keystone
        - /var/lib/placement
        - /var/log/nova
        - /var/log/neutron
        - /var/log/glance
        - /var/log/keystone
        - /var/log/placement
