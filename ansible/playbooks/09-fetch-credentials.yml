---
- name: Fetch OpenStack admin credentials to local machine
  hosts: openstack_controller
  become: true
  gather_facts: false

  vars:
    ansible_user: rocky
    ansible_password: "{{ vm_password }}"
    local_dest: "{{ playbook_dir }}/../client-configs"

  tasks:
    - name: Fetch admin-openrc.sh
      ansible.builtin.fetch:
        src: /etc/kolla/admin-openrc.sh
        dest: "{{ local_dest }}/admin-openrc.sh"
        flat: true

    - name: Read openrc content
      ansible.builtin.slurp:
        src: /etc/kolla/admin-openrc.sh
      register: openrc_content

    - name: Generate fish-compatible openrc
      ansible.builtin.copy:
        dest: "{{ local_dest }}/admin-openrc.fish"
        content: |
          # Fish-compatible OpenStack credentials
          # Generated from admin-openrc.sh
          {% for line in (openrc_content.content | b64decode).splitlines() %}
          {% if line.startswith('export ') %}
          {% set kv = line | replace('export ', '') | split('=', 1) %}
          set -gx {{ kv[0] }} {{ kv[1] }}
          {% endif %}
          {% endfor %}
      delegate_to: localhost
      become: false

    - name: Show usage
      ansible.builtin.debug:
        msg: >-
          Credentials saved to client-configs/.
          Fish: source client-configs/admin-openrc.fish |
          Bash: source client-configs/admin-openrc.sh
      run_once: true
