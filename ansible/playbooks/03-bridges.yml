---
- name: Configure virbr-wg bridge on all compute nodes
  hosts: compute
  become: true
  gather_facts: false

  handlers:
    - name: Reapply virbr-wg
      ansible.builtin.shell:
        cmd: |
          set -e
          # Bring bridge up if it doesn't exist yet
          if ! ip link show {{ virbr_wg_name }} &>/dev/null; then
            ifup {{ virbr_wg_name }}
          else
            ip link set {{ virbr_wg_name }} up 2>/dev/null || true
            ip link set {{ virbr_wg_name }} mtu {{ virbr_wg_mtu }} 2>/dev/null || true
            # Re-apply all post-up routes from the interfaces file without touching the bridge
            grep 'post-up ip route' /etc/network/interfaces | sed 's/.*post-up //' | while read -r cmd; do
              eval "$cmd" 2>/dev/null || true
            done
          fi

    - name: Save iptables rules
      ansible.builtin.command:
        cmd: netfilter-persistent save

  tasks:
    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        sysctl_set: true
        reload: true

    - name: Configure virbr-wg in /etc/network/interfaces
      ansible.builtin.blockinfile:
        path: /etc/network/interfaces
        marker: "# {mark} ANSIBLE MANAGED — virbr-wg"
        insertbefore: "^source"
        block: |
          auto {{ virbr_wg_name }}
          iface {{ virbr_wg_name }} inet manual
              bridge_ports none
              bridge_stp off
              bridge_fd 0
              mtu {{ virbr_wg_mtu }}
          {% for vm in vms %}
              post-up ip route replace {{ vm.ip }}/32 dev {{ virbr_wg_name }}
          {% endfor %}
          {% for peer in groups['compute'] | reject('equalto', inventory_hostname) %}
          {% for vm in hostvars[peer]['vms'] %}
              post-up ip route replace {{ vm.ip }}/32 via {{ hostvars[peer]['wg_ip'] }}
          {% endfor %}
          {% endfor %}
          {% set controller_ip = hostvars[groups['openstack_controller'][0]]['ansible_host'] %}
          {% set ns = namespace(found='') %}
          {% for host in groups['compute'] %}
          {% for vm in hostvars[host]['vms'] %}
          {% if vm.ip == controller_ip %}{% set ns.found = host %}{% endif %}
          {% endfor %}
          {% endfor %}
          {% if ns.found == inventory_hostname %}
              post-up ip route replace 172.16.102.128/25 dev {{ virbr_wg_name }}
          {% else %}
              post-up ip route replace 172.16.102.128/25 via {{ hostvars[ns.found]['wg_ip'] }} dev {{ wg_interface }}
          {% endif %}
      notify: Reapply virbr-wg

    - name: Install iptables-persistent
      ansible.builtin.package:
        name: iptables-persistent
        state: present

    - name: Do not masquerade VM traffic going into WireGuard
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ wg_vm_subnet }}"
        out_interface: "{{ wg_interface }}"
        jump: RETURN

    - name: Do not masquerade VM traffic staying on the bridge
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ wg_vm_subnet }}"
        out_interface: "{{ virbr_wg_name }}"
        jump: RETURN

    - name: Masquerade VM traffic to internet
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ wg_vm_subnet }}"
        jump: MASQUERADE
      notify: Save iptables rules
