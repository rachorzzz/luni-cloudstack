---
- name: Cleanup CloudStack and MySQL
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Gather OS family facts
      ansible.builtin.setup:
        gather_subset: ['!all', '!min', 'distribution']

  tasks:
    - name: Stop services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - cloudstack-management
        - cloudstack-agent
        - mysql
      ignore_errors: true

    - name: Purge packages (Debian)
      ansible.builtin.apt:
        name:
          - cloudstack-agent
          - cloudstack-management
          - cloudstack-common
          - cloudstack-ui
          - cloudstack-usage
          - mysql-server
          - mysql-client
          - mysql-common
          - python3-mysqldb
          - python3-pymysql
        state: absent
        purge: true
      ignore_errors: true
      when: ansible_os_family == 'Debian'

    - name: Purge packages (Rocky)
      ansible.builtin.dnf:
        name:
          - cloudstack-agent
          - cloudstack-management
          - cloudstack-common
          - cloudstack-ui
          - cloudstack-usage
          - mysql-server
          - mysql
          - python3-mysqlclient
          - python3-PyMySQL
        state: absent
        autoremove: true
      ignore_errors: true
      when: ansible_os_family == 'RedHat'

    - name: Remove data and config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cloudstack
        - /var/lib/cloudstack
        - /var/log/cloudstack
        - /usr/share/cloudstack-common
        - /usr/share/cloudstack-management
        - /etc/mysql
        - /var/lib/mysql
        - /var/log/mysql
        - /var/run/mysqld
        - /root/.my.cnf

    - name: Autoremove orphaned packages (Debian)
      ansible.builtin.apt:
        autoremove: true
        purge: true
      when: ansible_os_family == 'Debian'

    - name: Update apt cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_os_family == 'Debian'
